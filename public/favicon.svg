<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark background circle -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#06060f"/>
    </radialGradient>

    <!-- Main purple→indigo→teal gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#2dd4bf"/>
    </linearGradient>

    <!-- Spinner arc gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Glow filter for the V path -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.8 0 0.9 0 0  0 0 0.9 0 0  0.5 0 1 0 0  0 0 0 16 -6"
        result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bgGrad)"/>

  <!-- Spinning dashed ring -->
  <circle
    cx="32" cy="32" r="29.5"
    stroke="url(#ringGrad)"
    stroke-width="1.2"
    stroke-dasharray="38 120"
    stroke-linecap="round"
    fill="none"
    style="transform-origin:32px 32px; animation:spin 6s linear infinite"
  />

  <!-- Hexagon frame -->
  <path
    d="M32 6 L54 19 L54 45 L32 58 L10 45 L10 19 Z"
    fill="#0a0a18"
    stroke="url(#logoGrad)"
    stroke-width="1.4"
    opacity="0.97"
  />

  <!-- Inner ambient glow -->
  <ellipse cx="32" cy="32" rx="14" ry="14" fill="url(#logoGrad)" opacity="0.07"/>

  <!-- V lettermark with glow -->
  <path
    d="M18 22 L26.5 39 L32 48 L37.5 39 L46 22"
    stroke="url(#logoGrad)"
    stroke-width="3"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- Diagonal slash accent (S nod) -->
  <line
    x1="39" y1="21"
    x2="25" y2="43"
    stroke="url(#logoGrad)"
    stroke-width="1.6"
    stroke-linecap="round"
    opacity="0.4"
  />

  <style>
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
  </style>
</svg>